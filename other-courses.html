<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT Courses - Malabar Engineering College</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .course-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f5f8ff;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .course-item:hover {
            background: #004aad;
            color: white;
        }

        .course-sidebar {
            width: 300px;
            height: 600px;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: var(--shadow-soft);
        }

        .course-content-area {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-soft);
        }

        .course-pdf-container {
            width: 100%;
            height: 700px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .course-sidebar {
                width: 100%;
                height: 250px;
            }
            .course-pdf-container {
                height: 450px;
            }
        }

        @media (max-width: 480px) {
            .course-pdf-container {
                height: 350px;
            }
            .course-content-area {
                padding: 15px;
            }
        }
    </style>
    <link rel="stylesheet" href="mce-header-footer.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">

</head>


<body>
    <div class="container">
        <header class="page-header">
            <h1 class="dept-title" id="course-title">Course Title</h1>
            <p class="dept-desc" id="full-name">(Full Course Name)</p>
            <div class="decorative-divider"></div>
        </header>

        <div style="display:flex; flex-wrap:wrap; gap:20px; margin:40px 0;">

            <!-- Left Side -->
            <div class="course-sidebar">

                <div class="course-item" onclick="showCourse('CMC')">CMC</div>
                <div class="course-item" onclick="showCourse('ADL')">ADL</div>
                <div class="course-item" onclick="showCourse('TEC')">TEC</div>
                <div class="course-item" onclick="showCourse('TEL1')">TE L1</div>
                <div class="course-item" onclick="showCourse('TEL2')">TE L2</div>
                <div class="course-item" onclick="showCourse('TEL3')">TE L3</div>
                <div class="course-item" onclick="showCourse('GCCVT')">GCCVT</div>
                <div class="course-item" onclick="showCourse('TDST')">TDST</div>
                <div class="course-item" onclick="showCourse('PBCU')">PBCU</div>
                <div class="course-item" onclick="showCourse('CDTP')">CDTP</div>
                <div class="course-item" onclick="showCourse('CPHP')">CPHP</div>
                <div class="course-item" onclick="showCourse('CJP')">CJP</div>
                <div class="course-item" onclick="showCourse('CNP')">CNP</div>
                <div class="course-item" onclick="showCourse('CIP')">CIP</div>

            </div>

            <!-- Right Side -->
            <div class="course-content-area">

                <h2 id="courseName">Select a Course</h2>

                <p><strong>Certificate:</strong> <span id="certificate"></span></p>

                <p><strong>Duration:</strong> <span id="duration"></span></p>

                <p><strong>Eligibility:</strong> <span id="eligibility"></span></p>


                <!-- <p id="description"></p> -->

                <div id="pdfContainer" class="course-pdf-container">
                    <iframe id="pdfViewer" src="" width="100%" height="100%" style="border:none;">
                    </iframe>
                </div>

            </div>

        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="sit.html" class="btn-primary">← Back to SIT</a>
        </div>
    </div>

    <script>
        const courses = {
            'pgdca': ['PGDCA', 'Post Graduate Diploma in Computer Applications'],
            'adctt': ['ADCTT', 'Advanced Diploma in Computer Teacher Training'],
            'dca': ['DCA', 'Diploma in Computer Applications'],
            'dcfm': ['DCFM', 'Diploma in Computerized Financial Management'],
            'dfa': ['DFA', 'Diploma in Financial Accounting'],
            'ddtp': ['DDTP', 'Diploma in Desktop Publishing'],
            'doa': ['DOA', 'Diploma in Office Automation'],
            'dim': ['DIM', 'Diploma in Multimedia'],
            'cdeco': ['CDECO', 'Certificate in Data Entry and Computer Operations'],
            'cifa': ['CIFA', 'Certificate in Financial Accounting'],
            'cca': ['CCA', 'Certificate in Computer Applications'],
            'cwd': ['CWD', 'Certificate in Web Designing'],
            'ccad': ['CCAD', 'Certificate in Computer Aided Design'],
            'ceo': ['CEO', 'Certificate in Office Automation'],
            'other-courses': ['Other Courses', 'Specialized Short-term IT Courses']
        };

        const filename = window.location.pathname.split('/').pop().replace('.html', '');
        const data = courses[filename] || ['Course', 'Information'];

        document.getElementById('course-title').innerText = data[0];
        document.getElementById('full-name').innerText = '(' + data[1] + ')';
    </script>

        function showCourse(key) {

            const c = courseDetails[key];

            document.getElementById("courseName").innerText = c.name;

            document.getElementById("certificate").innerText =
                c.Certificate || "";

            document.getElementById("duration").innerText =
                c.duration;

            document.getElementById("eligibility").innerText =
                c.eligibility;

            // document.getElementById("description").innerText =
            //     c.description || "";

        showCourse('CMC');

    <script src="mce-components.js"></script>
    <script src="theme-scroller.js"></script>

</html>
