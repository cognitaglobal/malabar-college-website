<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Premium Department Section</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:40px}.wrapper{max-width:1400px;margin:auto;display:grid;grid-template-columns:320px 1fr;gap:40px}.sidebar,.content{background:#fff;border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}.sidebar h5{color:#8b3d2e}.sidebar button{display:block;width:100%;margin:8px 0;padding:15px;border:0;border-radius:8px;text-align:left;background:#fff;font-weight:bold}.sidebar button.active{background:#8b3d2e;color:#fff}.content h2{font-size:40px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.card{background:#fafafa;border-radius:12px;overflow:hidden;box-shadow:0 8px 18px rgba(0,0,0,.08)}.img{height:240px;background:#ddd;display:flex;align-items:center;justify-content:center}.info{text-align:center;padding:18px}@media(max-width:900px){.wrapper{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}}@media(max-width:600px){.cards{grid-template-columns:1fr}}
</style></head><body>
<div class='wrapper'>
<div class='sidebar'>
<h5>DEPARTMENTS</h5>
<button class='active'>Department of Travel & Tourism</button>
<button>Department of Commerce</button>
<button>Department of English</button>
<button>Department of Computer Science</button>
<button>Department of Multimedia</button>
<button>Department of Biotechnology</button>
<button>Department of Psychology</button>
<button>Department of Business Administration</button>
</div>
<div class='content'>
<h2>Department of Travel and Tourism</h2>
<p>Replace this with your department description. This component is structured to match the reference layout.</p>
<div class='cards'>
<div class='card'><div class='img'>Faculty Photo</div><div class='info'><h3>Anusha K</h3><p>Head of Department</p></div></div>
<div class='card'><div class='img'>Faculty Photo</div><div class='info'><h3>Suramya T</h3><p>Assistant Professor</p></div></div>
<div class='card'><div class='img'>Faculty Photo</div><div class='info'><h3>Najumdheen K</h3><p>Assistant Professor</p></div></div>
</div>
</div>
</div>
</body></html>
