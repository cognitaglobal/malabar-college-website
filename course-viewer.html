<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - Malabar Engineering College</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pdf-container {
            width: 100%;
            height: 600px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px dashed var(--primary-blue);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            text-align: center;
            padding: 20px;
        }

        .back-nav {
            margin-bottom: 20px;
        }

        .course-info {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
    <link rel="stylesheet" href="mce-header-footer.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
</head>

<body>
    <div class="container">
        <div class="back-nav">
            <a href="javascript:history.back()" class="pdf-btn">← Back</a>
        </div>

        <div class="course-info glass" style="padding: 40px;">
            <h1 id="course-title" style="color: var(--primary-blue);">Course Title</h1>
            <p id="course-description" style="margin-top: 15px; color: var(--text-light);">Loading course description...
            </p>
        </div>

        <div class="pdf-container glass">
            <div>
                <div style="font-size: 3rem; margin-bottom: 15px;">📁</div>
                <h3>Course PDF will be uploaded here later.</h3>
                <p>Please check back soon for the complete syllabus and course details.</p>
            </div>
        </div>

        <div style="text-align: center; margin: 40px 0;">
            <a href="index.html" class="pdf-btn" style="padding: 10px 30px;">Home Page</a>
        </div>
    </div>

    <script>
        // Simple script to populate based on filename if we use this as a template
        // Or we can just have individual files.
        const path = window.location.pathname;
        const filename = path.split('/').pop().replace('.html', '');
        const title = filename.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

        document.getElementById('course-title').innerText = title;
        document.getElementById('course-description').innerText = "Detailed information for the " + title + " program at Malabar Engineering College.";
    </script>
    <script src="mce-components.js"></script>
    <script src="theme-scroller.js"></script>
</body>

</html>
